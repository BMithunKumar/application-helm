<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>argocd-rollback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }
    h1 { font-size: 2.5rem; margin-bottom: 12px; }
    .version {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    p { color: #94a3b8; line-height: 1.6; }
    .info { margin-top: 24px; font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>argocd-rollback</h1>
    <span class="version" id="version">v1.0.0</span>
    <p>Sample application for ArgoCD rollback demonstration.</p>
    <div class="info">Built with GitHub Actions &middot; Deployed via ArgoCD</div>
  </div>
  <script>
    fetch('/version').then(r => r.text()).then(v => {
      document.getElementById('version').textContent = 'v' + v;
    }).catch(() => {});
  </script>
</body>
</html>
